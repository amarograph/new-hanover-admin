<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tableau de bord — Administration de New Hanover</title>
<link rel="stylesheet" href="/css/theme.css">
</head>
<body data-page="dashboard">
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="flex-between">
        <h1>Tableau de bord</h1>
      </div>

      <div class="card-row" id="stat-tiles"></div>

      <div class="card-row" style="grid-template-columns: 2fr 1fr;">
        <div class="sheet">
          <h3>Raccourcis rapides</h3>
          <div id="quick-actions" style="display:flex; flex-wrap:wrap; gap:0.6rem;"></div>
        </div>
        <div class="sheet">
          <h3>Solde actuel</h3>
          <div id="balance-block"><p class="muted">Chargement...</p></div>
        </div>
      </div>

      <div class="card-row" style="grid-template-columns: 1fr 1fr;">
        <div class="sheet">
          <h3>Prochains événements &amp; rendez-vous</h3>
          <div id="upcoming-events"><p class="muted">Chargement...</p></div>
        </div>
        <div class="sheet">
          <h3>Dernières entrées / sorties d'argent</h3>
          <div id="recent-transactions"><p class="muted">Chargement...</p></div>
        </div>
      </div>

      <div class="sheet" id="activity-sheet" style="display:none;">
        <h3>Dernières modifications effectuées sur le site</h3>
        <div id="recent-activity"></div>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/pages/dashboard.js"></script>
</body>
</html>
