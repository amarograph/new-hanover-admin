<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Journal d'activité — Administration de New Hanover</title>
<link rel="stylesheet" href="/css/theme.css">
</head>
<body data-page="journal" data-require-permission="admin:view_log">
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <h1>Journal d'activité</h1>
      <p class="muted">Historique des actions importantes réalisées sur la plateforme. Réservé aux administrateurs.</p>

      <div class="sheet">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Élément</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="table-empty" class="empty-state" style="display:none;">Aucune entrée.</div>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/pages/journal.js"></script>
</body>
</html>
