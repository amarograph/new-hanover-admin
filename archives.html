<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archives — Administration de New Hanover</title>
<link rel="icon" type="image/png" href="/css/img/favicon.png">
<link rel="stylesheet" href="/css/theme.css">
</head>
<body data-page="archives">
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <h1>Archives générales</h1>
      <p class="muted">Regroupe ce qui est déjà archivé, fermé, annulé ou terminé dans les autres modules — rien n'est jamais supprimé définitivement.</p>

      <div class="tabs" id="type-tabs"></div>

      <div class="sheet">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Type</th><th>Élément</th><th>Date</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="table-empty" class="empty-state" style="display:none;">Aucune archive à afficher.</div>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/pages/archives.js"></script>
</body>
</html>
