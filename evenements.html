<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Événements — Administration de New Hanover</title>
<link rel="icon" type="image/png" href="/css/img/favicon.png">
<link rel="stylesheet" href="/css/theme.css">
</head>
<body data-page="evenements" data-require-permission="evenements:view">
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="flex-between">
        <h1>Organisation des événements</h1>
        <button class="btn btn-gold" id="btn-new">+ Créer un événement</button>
      </div>

      <div class="tabs" id="status-tabs"></div>

      <div class="sheet" style="display:flex; gap:0.8rem; align-items:flex-end;">
        <div class="field" style="margin:0; flex:1;">
          <label>Rechercher par titre ou numéro</label>
          <input type="search" id="filter-q" placeholder="EVT-NH-1892-001 ou mot-clé...">
        </div>
      </div>

      <div class="sheet">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Numéro</th><th>Titre</th><th>Date</th><th class="text-right">Budget prévu</th><th class="text-right">Dépenses réelles</th><th>Statut</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="table-empty" class="empty-state" style="display:none;">Aucun événement dans cette catégorie.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouvel événement</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <form id="item-form">
      <input type="hidden" id="f-id">
      <div class="field"><label>Titre</label><input type="text" id="f-title" required></div>
      <div class="field"><label>Date prévue</label><input type="date" id="f-date"></div>
      <div class="field"><label>Description</label><textarea id="f-description" style="min-height:80px;"></textarea></div>
      <div class="field-row">
        <div class="field"><label>Budget prévu ($)</label><input type="number" step="0.01" min="0" id="f-budget" value="0"></div>
        <div class="field"><label>Dépenses réelles ($)</label><input type="number" step="0.01" min="0" id="f-depenses" value="0"></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" style="min-height:60px;"></textarea></div>

      <div id="item-meta" class="muted" style="margin-bottom:0.6rem;"></div>

      <div class="modal-actions">
        <div style="margin-right:auto; display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center;">
          <button type="button" class="btn btn-danger" id="btn-delete" style="display:none;">Supprimer</button>
          <div class="field" id="status-field" style="margin:0; display:none;">
            <select id="f-status">
              <option value="idee">Idée</option>
              <option value="a_preparer">À préparer</option>
              <option value="en_organisation">En organisation</option>
              <option value="en_attente_validation">En attente de validation</option>
              <option value="confirme">Confirmé</option>
              <option value="termine">Terminé</option>
              <option value="annule">Annulé</option>
              <option value="archive">Archivé</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn btn-outline" id="modal-cancel">Annuler</button>
        <button type="submit" class="btn btn-gold" id="save-btn">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/pages/evenements.js"></script>
</body>
</html>
