<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entreprises — Administration de New Hanover</title>
<link rel="icon" type="image/png" href="/css/img/favicon.png">
<link rel="stylesheet" href="/css/theme.css">
</head>
<body data-page="entreprises" data-require-permission="entreprises:view">
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="flex-between">
        <h1>Recensement des entreprises</h1>
        <button class="btn btn-gold" id="btn-new">+ Ajouter une entreprise</button>
      </div>

      <div class="tabs" id="status-tabs"></div>

      <div class="sheet" style="display:flex; gap:0.8rem; align-items:flex-end;">
        <div class="field" style="margin:0; flex:1;">
          <label>Rechercher par nom, numéro, activité ou propriétaire</label>
          <input type="search" id="filter-q" placeholder="ENT-NH-001 ou mot-clé...">
        </div>
      </div>

      <div class="sheet">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Numéro</th><th>Nom</th><th>Activité</th><th>Patron</th><th class="text-right">Compta</th><th>Statut</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="table-empty" class="empty-state" style="display:none;">Aucune entreprise.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouvelle entreprise</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <form id="item-form">
      <input type="hidden" id="f-id">
      <div class="field"><label>Nom de l'entreprise</label><input type="text" id="f-name" required></div>
      <div class="field-row">
        <div class="field"><label>Activité</label><input type="text" id="f-activity"></div>
        <div class="field"><label>Licence</label><input type="text" id="f-license"></div>
      </div>
      <div class="field"><label>Adresse</label><input type="text" id="f-address"></div>

      <div class="field-row">
        <div class="field"><label>Prénom du patron</label><input type="text" id="f-owner-first"></div>
        <div class="field"><label>Nom du patron</label><input type="text" id="f-owner-last"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Prénom du co-patron</label><input type="text" id="f-co-owner-first"></div>
        <div class="field"><label>Nom du co-patron</label><input type="text" id="f-co-owner-last"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Numéro de compte</label><input type="text" id="f-account-number"></div>
        <div class="field"><label>Montant de la compta ($)</label><input type="number" step="0.01" id="f-balance"></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" style="min-height:60px;"></textarea></div>

      <div id="item-meta" class="muted" style="margin-bottom:0.6rem;"></div>

      <div class="modal-actions">
        <div style="margin-right:auto; display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center;">
          <button type="button" class="btn btn-danger" id="btn-delete" style="display:none;">Supprimer</button>
          <div class="field" id="status-field" style="margin:0; display:none;">
            <select id="f-status">
              <option value="active">Active</option>
              <option value="en_attente_autorisation">En attente d'autorisation</option>
              <option value="suspendue">Suspendue</option>
              <option value="fermee">Fermée</option>
              <option value="archivee">Archivée</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn btn-outline" id="modal-cancel">Annuler</button>
        <button type="submit" class="btn btn-gold" id="save-btn">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/pages/entreprises.js"></script>
</body>
</html>
